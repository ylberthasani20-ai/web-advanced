<!DOCTYPE html>
<html>
    <head>
        <title> Lesson 6</title>
    </head>
    <body>
        <svg width="100" height>
            <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow"></circle>
        </svg>
        <svg width="400" height>
            <rect width="400" height="100" style="fill:blue;stroke-width:10;stroke: rgb(0,0,0, green, blue);"></rect>
        </svg>
        <svg width="400" height="180">
            <rect x="50" y="20" rx="20" width="150" height="150"
            style="fill:red;stroke:black;stroke-width:5;opacity:0.5"></rect>
        </svg>

        <svg width="300" height="200">
            <polygon points="100,10 40,198 190,78 10 ,78 169,198"
            style="fill:lime;stroke:purple;stroke-width:5;fill-rule:evenodd"></polygon>
        </svg>
    </body>
